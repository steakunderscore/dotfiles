# ~/.config/environment.d/10-wayland.conf
# General Wayland environment
XDG_SESSION_TYPE=wayland
XDG_CURRENT_DESKTOP=sway
WAYLAND_DISPLAY=wayland-1

# Force Wayland for specific applications
MOZ_ENABLE_WAYLAND=1          # Firefox
_JAVA_AWT_WM_NONREPARENTING=1 # Java applications
CLUTTER_BACKEND=wayland       # GTK clutter
SDL_VIDEODRIVER=wayland       # SDL2 applications
ELM_ENGINE=wayland           # Elementary/EFL
GDK_BACKEND=wayland          # GTK applications
QT_QPA_PLATFORM=wayland      # Qt applications
QT_WAYLAND_DISABLE_WINDOWDECORATION=1

# For some apps that need this to work properly with screensharing
XDG_CURRENT_DESKTOP=sway

# For better looking Qt applications
QT_QPA_PLATFORMTHEME=qt5ct
