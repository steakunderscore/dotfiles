# Config for Edamame

# Set monitors
set $laptop eDP-1
set $external DP-1

### Output configuration
# You can get the names of your outputs by running: swaymsg -t get_outputs
#
output $laptop resolution 3840x2400 position 2560,0 scale 2.2
output $external resolution 2560x1440 position 0,0 scale 1.0
